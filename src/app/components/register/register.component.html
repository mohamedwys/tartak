<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-dot"></div>
      <span>Marketplace</span>
    </div>
    <h1>Create an account</h1>
    <p class="auth-sub">Join our marketplace today</p>

    <form (ngSubmit)="register()">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" [(ngModel)]="name" name="name"
          placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
          placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
          placeholder="Min. 6 characters" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-auth">Sign up</button>
    </form>

    <p class="auth-switch">Already have an account? <a routerLink="/login">Log in</a></p>
  </div>
</div>
