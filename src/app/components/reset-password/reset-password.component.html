<div class="form-page">
  <div class="form-inner">
    <div class="form-header">
      <h1>Reset Password</h1>
      <p class="form-sub">Choose a new password for your account</p>
    </div>
    <div class="form-card">
      <div *ngIf="!done && !error.includes('Invalid reset link')">
        <div class="field">
          <label>New Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <p *ngIf="error" class="error-msg">{{ error }}</p>
        <button (click)="submit()" [disabled]="submitting" class="btn-submit">
          {{ submitting ? 'Resetting…' : 'Reset Password' }}
        </button>
      </div>
      <div *ngIf="done" class="done-msg">
        <p>Your password has been reset successfully.</p>
        <a routerLink="/login" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:12px;">Sign In</a>
      </div>
      <div *ngIf="error.includes('Invalid reset link')" class="done-msg">
        <p class="error-msg">{{ error }}</p>
        <a routerLink="/forgot-password" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:12px;">Request New Link</a>
      </div>
    </div>
  </div>
</div>
