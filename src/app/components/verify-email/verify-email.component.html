<div class="status-page">
  <div class="status-box">
    <div *ngIf="status === 'loading'" class="status-loading">
      <div class="spinner"></div>
      <p>Verifying your email…</p>
    </div>
    <div *ngIf="status === 'success'" class="status-success">
      <div class="status-icon">✓</div>
      <h2>Email Verified</h2>
      <p>{{ message }}</p>
      <a routerLink="/login" class="btn-primary">Sign In</a>
    </div>
    <div *ngIf="status === 'error'" class="status-error">
      <div class="status-icon error">✗</div>
      <h2>Verification Failed</h2>
      <p>{{ message }}</p>
      <a routerLink="/" class="btn-primary">Go Home</a>
    </div>
  </div>
</div>
