<div
  class="drop-zone"
  [class.drag-over]="isDragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <div *ngIf="previewUrl; else placeholder" class="preview-wrap">
    <img [src]="previewUrl" alt="Preview" class="preview-img">
  </div>

  <ng-template #placeholder>
    <div class="placeholder-content">
      <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="placeholder-text">Drop image here or click to browse</p>
      <p class="placeholder-hint">JPEG, PNG, WebP · max 5 MB</p>
    </div>
  </ng-template>

  <input
    #fileInput
    type="file"
    accept="image/*"
    class="file-input-hidden"
    (change)="onFileSelected($event)"
    (click)="$event.stopPropagation()"
  >
</div>

<p *ngIf="uploading" class="upload-status">Uploading…</p>
<p *ngIf="uploadError" class="upload-error">{{ uploadError }}</p>
<a *ngIf="previewUrl && !uploading" class="change-photo" (click)="fileInput.click(); $event.preventDefault()">Change photo</a>
