<div class="form-page">
  <div class="form-inner">
    <div class="form-header">
      <a routerLink="/login" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to sign in
      </a>
      <h1>Forgot Password</h1>
      <p class="form-sub">Enter your email and we'll send you a reset link</p>
    </div>
    <div class="form-card">
      <div *ngIf="!done">
        <div class="field">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <p *ngIf="error" class="error-msg">{{ error }}</p>
        <button (click)="submit()" [disabled]="submitting" class="btn-submit">
          {{ submitting ? 'Sending…' : 'Send Reset Link' }}
        </button>
      </div>
      <div *ngIf="done" class="done-msg">
        <p>If an account with that email exists, a reset link has been sent. Check your inbox.</p>
        <a routerLink="/login" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:12px;">Back to Sign In</a>
      </div>
    </div>
  </div>
</div>
