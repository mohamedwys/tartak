<section class="home-hero" aria-labelledby="home-hero-headline" #hero>
  <!-- Layer 0: background gradient applied via .home-hero bg -->

  <!-- Layer 1A: large zellige tiles (teal-300), slow spin -->
  <div class="zellige-layer zellige-layer-large" aria-hidden="true"></div>
  <!-- Layer 1B: small zellige tiles (ochre-300), overlay blend — static (parallax in 12d) -->
  <div class="zellige-layer zellige-layer-small" aria-hidden="true"></div>

  <!-- Layer 2: three absolutely-positioned lighting orbs, blur 80px -->
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>
  <div class="orb orb-c" aria-hidden="true"></div>

  <!-- Layer 3: film grain — inline SVG turbulence, overlay blend -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Layer 4: content -->
  <div class="hero-content">
    <span class="eyebrow">
      <span class="eyebrow-dot" aria-hidden="true"></span>
      Trusted marketplace · North Africa
    </span>

    <h1 id="home-hero-headline" class="headline">
      <span class="headline-line">Commerce from the souk,</span>
      <span class="headline-line">reinvented for</span>
      <span class="headline-line"><span class="headline-gradient">the entire continent.</span></span>
    </h1>

    <p class="subhead">
      Pro sellers list their catalogs. Buyers discover quality.
      A curated Pro-grade marketplace for modern Africa.
    </p>

    <div class="cta-row">
      <button type="button" class="cta cta-primary" (click)="onStartSelling()">
        Start selling
      </button>
      <a class="cta cta-secondary" href="#home-tiles" (click)="onBrowseCatalog($event)">
        Browse catalog
      </a>
    </div>

    <div class="stats">
      <span>2,400+ sellers</span>
      <span class="stats-sep" aria-hidden="true">·</span>
      <span>14 categories</span>
      <span class="stats-sep" aria-hidden="true">·</span>
      <span>MAD</span>
      <span class="stats-sep" aria-hidden="true">·</span>
      <span>Pan-African</span>
    </div>
  </div>
</section>
