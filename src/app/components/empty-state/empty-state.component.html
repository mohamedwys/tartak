<div class="empty-state">
  <div class="empty-illo" aria-hidden="true">
    <!-- Zellige-derived illustrations: 8-point star + octagon + interlock -->
    <svg *ngIf="icon === 'catalog'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <polygon points="48,10 58,30 80,30 64,46 70,68 48,56 26,68 32,46 16,30 38,30"/>
      <rect x="24" y="46" width="48" height="36" rx="4"/>
      <path d="M34 60h28M34 68h20"/>
    </svg>
    <svg *ngIf="icon === 'inquiries'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M14 28c0-6 4-10 10-10h48c6 0 10 4 10 10v32c0 6-4 10-10 10H40l-16 12V70h-.8c-5.4 0-9.2-4-9.2-10z"/>
      <circle cx="34" cy="42" r="3"/>
      <circle cx="48" cy="42" r="3"/>
      <circle cx="62" cy="42" r="3"/>
    </svg>
    <svg *ngIf="icon === 'favorites'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M48 80C28 66 14 54 14 38a16 16 0 0 1 28-10 16 16 0 0 1 28 10c0 16-14 28-22 42z"/>
      <polygon points="48,36 51,44 59,44 53,49 55,57 48,52 41,57 43,49 37,44 45,44"/>
    </svg>
    <svg *ngIf="icon === 'orders'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M14 28L48 12l34 16v36L48 80 14 64z"/>
      <path d="M14 28l34 16 34-16M48 44v36"/>
      <polygon points="48,34 51,40 57,40 52,44 54,50 48,46 42,50 44,44 39,40 45,40"/>
    </svg>
    <svg *ngIf="icon === 'search'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <circle cx="42" cy="42" r="26"/>
      <path d="M60 60l22 22"/>
      <polygon points="42,30 45,38 53,38 46,43 49,51 42,47 35,51 38,43 31,38 39,38"/>
    </svg>
    <svg *ngIf="icon === 'storefront'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M14 30l10-16h48l10 16v8a10 10 0 0 1-20 0 10 10 0 0 1-20 0 10 10 0 0 1-20 0 10 10 0 0 1-8-8v0z"/>
      <path d="M20 40v40h56V40"/>
      <rect x="38" y="50" width="20" height="30"/>
    </svg>
    <svg *ngIf="icon === 'addons'" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4">
      <polygon points="48,10 60,34 86,38 66,56 72,82 48,68 24,82 30,56 10,38 36,34"/>
    </svg>
  </div>
  <div class="empty-body">
    <h3 class="empty-title">{{ title || 'Nothing here yet' }}</h3>
    <p *ngIf="body" class="empty-text">{{ body }}</p>
    <ng-content></ng-content>
  </div>
</div>
