<a class="skip-link" href="#main">Skip to content</a>

<header class="app-header" [class.scrolled]="scrolled">
  <div class="header-inner">
    <a routerLink="/" class="brand" aria-label="Tartak home">
      <svg class="brand-mark" viewBox="0 0 40 40" width="36" height="36" aria-hidden="true">
        <rect width="40" height="40" rx="9" fill="var(--navy-900)"/>
        <g transform="translate(4,6)">
          <polygon points="2,0 8,0 10,2 10,8 8,10 2,10 0,8 0,2" fill="var(--teal-500)"/>
          <polygon points="16,0 17.5,3 21,2 19.5,5 22,7 19.5,9 21,12 17.5,11 16,14 14.5,11 11,12 12.5,9 10,7 12.5,5 11,2 14.5,3" fill="var(--ochre-500)"/>
          <polygon points="24,0 30,0 32,2 32,8 30,10 24,10 22,8 22,2" fill="var(--terra-500)"/>
        </g>
        <rect x="17" y="16" width="6" height="20" fill="var(--cream-100)"/>
        <polygon points="20,23 21.2,25 23.5,25 22,26.4 22.7,28.6 20,27.3 17.3,28.6 18,26.4 16.5,25 18.8,25" fill="var(--ochre-500)"/>
      </svg>
      <span class="brand-name">Tartak</span>
    </a>

    <div class="mode-toggle" role="tablist" aria-label="Marketplace mode">
      <a routerLink="/" class="mode-option" role="tab"
        [attr.aria-selected]="currentMode() === 'pro'"
        [class.active]="currentMode() === 'pro'">Pro</a>
      <a routerLink="/marketplace" class="mode-option" role="tab"
        [attr.aria-selected]="currentMode() === 'marketplace'"
        [class.active]="currentMode() === 'marketplace'">Marketplace</a>
    </div>

    <nav class="header-nav" aria-label="Primary">
      <a routerLink="/" class="nav-link" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:true}">Browse</a>

      <ng-container *ngIf="isLoggedIn()">
        <a *ngIf="currentOrgId" routerLink="/dashboard/overview" class="nav-link"
           routerLinkActive="active">Dashboard</a>
        <a routerLink="/inbox" class="nav-link nav-inbox" routerLinkActive="active" aria-label="Inbox">
          Inbox
          <span *ngIf="unreadCount > 0" class="inbox-badge" [attr.aria-label]="unreadCount + ' unread'">{{ unreadCount }}</span>
        </a>
        <a routerLink="/add-product" class="btn btn-warm btn-sm btn-sell">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M7 1.5v11M1.5 7h11" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          Sell
        </a>

        <div class="account-menu" (click)="$event.stopPropagation()">
          <button type="button" class="btn-account" (click)="toggleAccountMenu($event)"
                  [attr.aria-expanded]="accountMenuOpen">
            <span class="account-avatar" aria-hidden="true">{{ myInitials || 'U' }}</span>
            <span class="account-label">{{ currentContextLabel() }}</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
          <div class="account-dropdown" *ngIf="accountMenuOpen" role="menu">
            <div class="dropdown-section-label">Switch account</div>
            <button type="button" class="dropdown-item" role="menuitem"
              [class.active]="currentOrgId === null" (click)="switchTo(null)">
              <span class="item-avatar" aria-hidden="true">P</span>
              <span class="item-body">
                <span class="item-name">Personal</span>
                <span class="item-meta">Individual</span>
              </span>
              <svg *ngIf="currentOrgId === null" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7.5l3 3 7-7" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
            <button *ngFor="let o of myOrgs" type="button" class="dropdown-item" role="menuitem"
              [class.active]="currentOrgId === o._id" (click)="switchTo(o._id)">
              <span class="item-avatar" aria-hidden="true">{{ orgInitial(o.name) }}</span>
              <span class="item-body">
                <span class="item-name">{{ o.name }}</span>
                <span class="item-meta">{{ o.myRole || 'member' }}</span>
              </span>
              <svg *ngIf="currentOrgId === o._id" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7.5l3 3 7-7" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
            <div class="dropdown-divider"></div>
            <button type="button" class="dropdown-item dropdown-action" (click)="goCreateBusiness()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              Create business account
            </button>
            <div class="dropdown-divider"></div>
            <a [routerLink]="['/seller', myId]" class="dropdown-item" (click)="closeMenus()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <circle cx="8" cy="6" r="3"/>
                <path d="M2.5 14c0-2.8 2.5-5 5.5-5s5.5 2.2 5.5 5"/>
              </svg>
              View profile
            </a>
            <a routerLink="/profile/edit" class="dropdown-item" (click)="closeMenus()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <path d="M2 11.2V14h2.8l8-8L10 3.2l-8 8z"/>
              </svg>
              Edit profile
            </a>
            <button type="button" class="dropdown-item dropdown-logout" (click)="logout()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                <path d="M6 3H3v10h3M10 11l3-3-3-3M6 8h7"/>
              </svg>
              Log out
            </button>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="btn btn-ghost btn-sm">Log in</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Sign up</a>
      </ng-container>
    </nav>
  </div>

  <nav *ngIf="currentMode() === 'pro' && topCategories.length > 0"
       class="category-bar" aria-label="Browse categories">
    <div class="category-bar-inner">
      <a *ngFor="let c of visibleTopCategories" [routerLink]="['/c', c.slug]"
         class="cat-link" routerLinkActive="active">{{ c.name }}</a>

      <div *ngIf="overflowTopCategories.length > 0" class="more-menu"
           (click)="$event.stopPropagation()">
        <button type="button" class="cat-link cat-more"
                (click)="toggleMoreMenu($event)"
                [attr.aria-expanded]="moreMenuOpen">
          More
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </button>
        <div class="more-dropdown" *ngIf="moreMenuOpen" role="menu">
          <a *ngFor="let c of overflowTopCategories" [routerLink]="['/c', c.slug]"
             class="more-item" role="menuitem" (click)="closeMoreMenu()">{{ c.name }}</a>
        </div>
      </div>
    </div>
  </nav>
</header>

<main class="app-main" id="main">
  <router-outlet></router-outlet>
</main>
<app-toast></app-toast>
