<header class="app-header">
  <div class="header-inner">
    <a routerLink="/" class="brand">
      <div class="brand-mark"></div>
      <span class="brand-name">Tartak</span>
    </a>

    <div class="mode-toggle" role="tablist" aria-label="Marketplace mode">
      <a routerLink="/" class="mode-option" role="tab"
        [attr.aria-selected]="currentMode() === 'pro'"
        [class.active]="currentMode() === 'pro'">Pro</a>
      <a routerLink="/marketplace" class="mode-option" role="tab"
        [attr.aria-selected]="currentMode() === 'marketplace'"
        [class.active]="currentMode() === 'marketplace'">Marketplace</a>
    </div>

    <nav class="header-nav">
      <a routerLink="/" class="nav-link" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:true}">Browse</a>

      <ng-container *ngIf="isLoggedIn()">
        <a *ngIf="currentOrgId" routerLink="/dashboard/overview" class="nav-link"
           routerLinkActive="active">Open dashboard</a>
        <a routerLink="/inbox" class="nav-link nav-inbox" routerLinkActive="active">
          Inbox
          <span *ngIf="unreadCount > 0" class="inbox-badge">{{ unreadCount }}</span>
        </a>
        <a routerLink="/add-product" class="btn-sell">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Sell
        </a>

        <div class="account-menu" (click)="$event.stopPropagation()">
          <button type="button" class="btn-account" (click)="toggleAccountMenu($event)">
            <span class="account-label">{{ currentContextLabel() }}</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
              <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="account-dropdown" *ngIf="accountMenuOpen">
            <div class="dropdown-section-label">Switch account</div>
            <button type="button" class="dropdown-item"
              [class.active]="currentOrgId === null" (click)="switchTo(null)">
              <span class="item-name">Personal</span>
              <span class="item-meta">Individual</span>
            </button>
            <button *ngFor="let o of myOrgs" type="button" class="dropdown-item"
              [class.active]="currentOrgId === o._id" (click)="switchTo(o._id)">
              <span class="item-name">{{ o.name }}</span>
              <span class="item-meta">{{ o.myRole || 'member' }}</span>
            </button>
            <div class="dropdown-divider"></div>
            <button type="button" class="dropdown-item dropdown-action" (click)="goCreateBusiness()">
              + Create business account
            </button>
          </div>
        </div>

        <a [routerLink]="['/seller', myId]" class="btn-profile" title="My profile" routerLinkActive="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </a>
        <a routerLink="/profile/edit" class="btn-edit-profile" routerLinkActive="active">Edit profile</a>
        <button (click)="logout()" class="btn-logout">Log out</button>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="btn-nav-login">Log in</a>
        <a routerLink="/register" class="btn-nav-signup">Sign up</a>
      </ng-container>
    </nav>
  </div>

  <!-- Pro-mode category bar: 14 top-level categories + overflow "More ▾".
       Hidden entirely in Marketplace mode. -->
  <nav *ngIf="currentMode() === 'pro' && topCategories.length > 0"
       class="category-bar" aria-label="Browse categories">
    <div class="category-bar-inner">
      <a *ngFor="let c of visibleTopCategories" [routerLink]="['/c', c.slug]"
         class="cat-link" routerLinkActive="active">{{ c.name }}</a>

      <div *ngIf="overflowTopCategories.length > 0" class="more-menu"
           (click)="$event.stopPropagation()">
        <button type="button" class="cat-link cat-more"
                (click)="toggleMoreMenu($event)"
                [attr.aria-expanded]="moreMenuOpen">
          More
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
            <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="more-dropdown" *ngIf="moreMenuOpen">
          <a *ngFor="let c of overflowTopCategories" [routerLink]="['/c', c.slug]"
             class="more-item" (click)="closeMoreMenu()">{{ c.name }}</a>
        </div>
      </div>
    </div>
  </nav>
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
<app-toast></app-toast>
